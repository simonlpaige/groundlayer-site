<?xml version="1.0" encoding="UTF-8"?>
<!--
  Groundlayer LLC - Wordmark
  Groundlayer twist: pure type only. Inter 700, bedrock restraint.
  A single thin horizontal rule ABOVE the mark (the "horizon line")
  is the only structural cue. No color, no accent. Most restrained brand.
  Palette: Near-black on Off-white.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 140" width="560" height="140" role="img" aria-label="Groundlayer LLC">
  <style>
    .paper { fill: #F7F5F2; }
    .ink   { fill: #1A1A1A; }
    .rule  { stroke: #4A4A4A; stroke-width: 1; }
    .body  { font-family: "Inter", system-ui, sans-serif; font-weight: 700; }
    .sub   { font-family: "Inter", system-ui, sans-serif; font-weight: 500; letter-spacing: 0.18em; }
  </style>
  <rect class="paper" width="560" height="140"/>
  <!-- horizon line - the only visual element besides type -->
  <line class="rule" x1="40" y1="48" x2="520" y2="48"/>
  <!-- wordmark - Inter 700, tight tracking, understated -->
  <text class="body ink" x="280" y="88" font-size="36" text-anchor="middle" letter-spacing="-0.01em">groundlayer</text>
  <!-- LLC subline - restrained institutional cue -->
  <text class="sub ink" x="280" y="112" font-size="10" text-anchor="middle" opacity="0.6">LLC  ·  KANSAS  CITY</text>
</svg>
